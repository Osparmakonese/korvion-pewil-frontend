<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <!-- Theme color now matches the locked mobile palette (Pewil green).
         viewport-fit=cover lets safe-area-inset-* land correctly on
         notched iPhones so our bottom-nav padding works. -->
    <meta name="theme-color" content="#1a6b3a"/>
    <meta name="mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
    <meta name="apple-mobile-web-app-title" content="Pewil"/>
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta
      name="description"
      content="The operating system for African shops &amp; farms. POS, stock, tax-compliant exports, works offline. Mobile money + card. 14-day free trial, no card."
    />
    <!-- OpenGraph + Twitter cards — used when someone shares pewil.org
         on WhatsApp, Twitter, Facebook. og:image should be a 1200x630
         PNG of the POS lane with a Pewil wordmark; using logo512.png
         as a placeholder until we ship the proper share image. -->
    <meta property="og:title" content="Pewil — Run your shop from your pocket" />
    <meta property="og:description" content="POS, stock, tax-compliant exports, works offline. Built for African shops &amp; farms. 14-day free trial, no card." />
    <meta property="og:image" content="%PUBLIC_URL%/logo512.png" />
    <meta property="og:url" content="https://pewil.org/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Pewil" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Pewil — Run your shop from your pocket" />
    <meta name="twitter:description" content="POS, stock, tax-compliant exports, works offline. Built for African shops &amp; farms." />
    <meta name="twitter:image" content="%PUBLIC_URL%/logo512.png" />
    <!-- Apple touch icons: spec recommends multiple sizes so iOS picks
         the right one for home-screen, splash, and app switcher. We
         only have 192/512 PNGs in /public, but iOS will pick the
         closest match for each size from these. -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="%PUBLIC_URL%/logo192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="%PUBLIC_URL%/logo512.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Playfair+Display:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <title>Pewil — Run your shop from your pocket | POS &amp; farm management for Africa</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
